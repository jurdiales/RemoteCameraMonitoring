<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemoteCamera \u2014 Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0c0e; color: #c8cdd4;
            font-family: 'Barlow', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .card {
            background: #111417; border: 1px solid #1e2329; border-radius: 8px;
            padding: 40px 36px; width: 320px;
            display: flex; flex-direction: column; gap: 20px;
        }
        .logo { font-family: 'Share Tech Mono', monospace; color: #00e676;
                font-size: 1.1rem; letter-spacing: .12em; text-align: center; }
        .logo span { color: #4a5060; font-size: .8em; }
        label { font-family: 'Share Tech Mono', monospace; font-size: .65rem;
                letter-spacing: .15em; color: #4a5060; text-transform: uppercase;
                display: block; margin-bottom: 6px; }
        input[type=password] {
            width: 100%; background: #0a0c0e; border: 1px solid #1e2329;
            border-radius: 4px; color: #c8cdd4;
            font-family: 'Share Tech Mono', monospace; font-size: .9rem;
            padding: 10px 12px; outline: none; transition: border-color .2s;
        }
        input[type=password]:focus { border-color: #00e676; }
        button {
            width: 100%; background: #00e676; color: #0a0c0e; border: none;
            border-radius: 4px; font-family: 'Barlow', sans-serif; font-weight: 700;
            font-size: .9rem; letter-spacing: .06em; padding: 11px;
            cursor: pointer; transition: opacity .2s;
        }
        button:hover { opacity: .85; }
        .error { font-family: 'Share Tech Mono', monospace; font-size: .72rem;
                 color: #ff3d3d; text-align: center; }
    </style>
</head>
<body>
    <form class="card" method="post">
        <div class="logo">RemoteCamera <span>// ACCESS</span></div>
        <div>
            <label for="pwd">Password</label>
            <input id="pwd" type="password" name="password" autofocus autocomplete="current-password">
        </div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <button type="submit">Enter</button>
    </form>
</body>
</html>
